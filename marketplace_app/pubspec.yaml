name: marketplace_app
description: "Marketplace dla wszelakich usług, które można wykonać w domu."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_osm_plugin: ^1.4.3
  dio: ^5.9.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  table_calendar: ^3.2.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - lib/images/logo.png

linter:
  rules:
    flutter_style_todos: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/logo.png"
  web:
    generate: true
    image_path: "lib/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"